<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客来来商标候选稿</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4ef;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 28px 52px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .note {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }
    .art {
      display: grid;
      min-height: 270px;
      place-items: center;
      padding: 28px;
    }
    .art.square img {
      width: min(76%, 300px);
    }
    .art.wide img {
      width: 96%;
    }
    figcaption {
      border-top: 1px solid var(--line);
      padding: 14px 16px 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    figcaption b {
      color: var(--ink);
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>客来来商标候选稿</h1>
    <p class="note">由“商标生成员”方向稿落成 SVG。所有候选均为可编辑矢量草案；正式注册前仍需做商标近似检索和法务复核。</p>
    <section class="grid">
      <figure>
        <div class="art wide"><img src="kellai-01-flow-lockup.svg" alt="图文组合商标"></div>
        <figcaption><b>01 主图文组合</b>适合官网、软件启动页、商务材料；保留客流路径、会话和增长柱。</figcaption>
      </figure>
      <figure>
        <div class="art square"><img src="kellai-02-door-chat-mark.svg" alt="迎客门形 App 图标"></div>
        <figcaption><b>02 迎客门形 App 图标</b>强调“来客进门”和及时沟通，适合桌面/App 图标。</figcaption>
      </figure>
      <figure>
        <div class="art square"><img src="kellai-03-k-monogram.svg" alt="K 字母标"></div>
        <figcaption><b>03 K 字母标</b>适合开放平台、插件市场、英文场景和 favicon。</figcaption>
      </figure>
      <figure>
        <div class="art square"><img src="kellai-04-trust-seal.svg" alt="可信印章商标"></div>
        <figcaption><b>04 可信印章</b>偏认证/生态伙伴/服务承诺，可用于对外背书场景。</figcaption>
      </figure>
      <figure>
        <div class="art wide"><img src="kellai-05-package-label.svg" alt="包装标签商标"></div>
        <figcaption><b>05 包装标签</b>更适合宣传物料、展会贴纸、渠道方案封面。</figcaption>
      </figure>
      <figure>
        <div class="art wide"><img src="kellai-06-minimal-wordmark.svg" alt="极简字标"></div>
        <figcaption><b>06 极简字标</b>文字识别最强，适合商标注册主方向之一。</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
