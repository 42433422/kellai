<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客来来 Logo 参考学习后重做</title>
  <style>
    :root { font-family: PingFang SC, Hiragino Sans GB, Microsoft YaHei, Heiti SC, Arial Unicode MS, sans-serif; color: #102a56; background: #f6f8fb; }
    body { margin: 0; padding: 44px; }
    h1 { margin: 0 0 8px; font-size: 38px; line-height: 1.2; }
    .lead { margin: 0 0 30px; color: #587392; font-size: 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 24px; }
    section { background: white; border: 1px solid #dce6f1; border-radius: 8px; padding: 24px; }
    .logo { width: 100%; height: 170px; object-fit: contain; display: block; }
    .icon { width: 112px; height: 112px; object-fit: contain; display: block; margin-top: 18px; }
    h2 { margin: 18px 0 8px; font-size: 22px; }
    p { margin: 0; color: #587392; line-height: 1.6; }
    @media (max-width: 980px) { body { padding: 22px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>客来来 Logo 重做版</h1>
  <p class="lead">参考相邻 SaaS/CRM/客服品牌规律后收敛：一个主符号 + 中文字标，不做黑白稿。</p>
  <main class="grid">
    <section>
      <img class="logo" src="kellai-online-01-arrival-ring-logo.svg" alt="来客环 Logo">
      <img class="icon" src="kellai-online-01-arrival-ring-icon.svg" alt="来客环 Icon">
      <h2>01 来客环</h2>
      <p>主推：一个客户流入的专属符号，克制、容易延展。</p>
    </section>
    <section>
      <img class="logo" src="kellai-online-02-come-leaf-logo.svg" alt="来叶 Logo">
      <img class="icon" src="kellai-online-02-come-leaf-icon.svg" alt="来叶 Icon">
      <h2>02 来叶</h2>
      <p>更亲和，适合中小商家和私域增长。</p>
    </section>
    <section>
      <img class="logo" src="kellai-online-03-k-loop-logo.svg" alt="K 回路 Logo">
      <img class="icon" src="kellai-online-03-k-loop-icon.svg" alt="K 回路 Icon">
      <h2>03 K 回路</h2>
      <p>更 SaaS / 科技感，适合桌面端和国际化。</p>
    </section>
  </main>
</body>
</html>
