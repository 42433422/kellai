<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客来来彩色 Logo 候选</title>
  <style>
    :root {
      font-family: PingFang SC, Hiragino Sans GB, Microsoft YaHei, Heiti SC, Arial Unicode MS, sans-serif;
      color: #15315f;
      background: #f6f8fb;
    }
    body {
      margin: 0;
      padding: 44px;
    }
    h1 {
      margin: 0 0 28px;
      font-size: 38px;
      line-height: 1.2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }
    section {
      background: white;
      border: 1px solid #dce6f1;
      border-radius: 8px;
      padding: 26px;
    }
    .logo {
      width: 100%;
      height: 180px;
      object-fit: contain;
      display: block;
    }
    .icon {
      width: 96px;
      height: 96px;
      object-fit: contain;
      display: block;
      margin-top: 14px;
    }
    h2 {
      margin: 16px 0 6px;
      font-size: 21px;
    }
    p {
      margin: 0;
      color: #52708f;
      font-size: 15px;
    }
    @media (max-width: 900px) {
      body { padding: 22px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>客来来彩色 Logo 候选</h1>
  <main class="grid">
    <section>
      <img class="logo" src="kellai-logo-01-growth-flow.svg" alt="增长流线 横版 Logo">
      <img class="icon" src="kellai-icon-01-growth-flow.svg" alt="增长流线 图标">
      <h2>01 增长流线</h2>
      <p>来客不断 · 跟进更快</p>
    </section>
    <section>
      <img class="logo" src="kellai-logo-02-deal-arc.svg" alt="成交弧线 横版 Logo">
      <img class="icon" src="kellai-icon-02-deal-arc.svg" alt="成交弧线 图标">
      <h2>02 成交弧线</h2>
      <p>把来客变成机会</p>
    </section>
    <section>
      <img class="logo" src="kellai-logo-03-customer-gate.svg" alt="来客入口 横版 Logo">
      <img class="icon" src="kellai-icon-03-customer-gate.svg" alt="来客入口 图标">
      <h2>03 来客入口</h2>
      <p>多渠道客户跟进</p>
    </section>
    <section>
      <img class="logo" src="kellai-logo-04-welcome-door.svg" alt="迎客门 横版 Logo">
      <img class="icon" src="kellai-icon-04-welcome-door.svg" alt="迎客门 图标">
      <h2>04 迎客门</h2>
      <p>轻量客户增长 CRM</p>
    </section>
  </main>
</body>
</html>
