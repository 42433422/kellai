<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客来来商标候选稿 v2</title>
  <style>
    :root {
      color-scheme: light;
      font-family: PingFang SC, Hiragino Sans GB, Microsoft YaHei, Heiti SC, Arial Unicode MS, sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }
    body {
      margin: 0;
      padding: 48px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.2;
    }
    .note {
      margin: 0 0 32px;
      color: #64748b;
      font-size: 16px;
      line-height: 1.7;
      max-width: 980px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }
    figure {
      margin: 0;
      background: #fff;
      border: 1px solid #dbe4ef;
      border-radius: 8px;
      padding: 22px;
    }
    img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      background: #fff;
    }
    figcaption {
      margin-top: 16px;
      font-weight: 800;
      color: #0f172a;
    }
    @media (max-width: 980px) {
      body { padding: 24px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>客来来商标候选稿 v2</h1>
  <p class="note">根据商标生成员内置提示词重新改写为“注册候选”方向：强轮廓、少小字、可黑白化、可小尺寸识别。SVG 为可编辑草案，正式注册前仍需商标近似检索。</p>
  <main class="grid">
      <figure>
        <img src="kellai-v2-01-wordmark-rhythm.svg" alt="01 字标节奏">
        <figcaption>01 字标节奏</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-02-entry-flow-mark.svg" alt="02 来客入口">
        <figcaption>02 来客入口</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-03-lead-check-symbol.svg" alt="03 线索成交">
        <figcaption>03 线索成交</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-04-lai-chat-icon.svg" alt="04 来字气泡">
        <figcaption>04 来字气泡</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-05-kll-path-monogram.svg" alt="05 KLL 路径">
        <figcaption>05 KLL 路径</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-06-channel-hub.svg" alt="06 渠道汇聚">
        <figcaption>06 渠道汇聚</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-07-funnel-growth.svg" alt="07 获客漏斗">
        <figcaption>07 获客漏斗</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-08-trust-seal-clean.svg" alt="08 可信印章">
        <figcaption>08 可信印章</figcaption>
      </figure>
      <figure>
        <img src="kellai-v2-09-mono-core-mark.svg" alt="09 单色核心">
        <figcaption>09 单色核心</figcaption>
      </figure>
  </main>
</body>
</html>
