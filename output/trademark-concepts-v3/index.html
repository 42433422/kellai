<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客来来商标候选 v3</title>
  <style>
    :root {
      font-family: PingFang SC, Hiragino Sans GB, Microsoft YaHei, Heiti SC, Arial Unicode MS, sans-serif;
      color: #101828;
      background: #f6f8fb;
    }
    body {
      margin: 0;
      padding: 44px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 36px;
      line-height: 1.2;
    }
    .lead {
      margin: 0 0 30px;
      color: #667085;
      font-size: 16px;
      line-height: 1.7;
    }
    .concept {
      display: grid;
      grid-template-columns: 220px minmax(360px, 1fr) 260px;
      gap: 20px;
      align-items: center;
      margin: 0 0 22px;
      padding: 20px;
      background: #fff;
      border: 1px solid #d8e1ec;
      border-radius: 8px;
    }
    .media {
      background: #fff;
      border: 1px solid #e5ebf3;
      border-radius: 8px;
      display: grid;
      place-items: center;
      min-height: 168px;
    }
    .mark img {
      width: 168px;
      height: 168px;
      object-fit: contain;
    }
    .lockup img {
      width: 100%;
      height: 168px;
      object-fit: contain;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: #667085;
      line-height: 1.65;
    }
    @media (max-width: 980px) {
      body { padding: 22px; }
      .concept { grid-template-columns: 1fr; }
      .media { min-height: 190px; }
    }
  </style>
</head>
<body>
  <h1>客来来商标候选 v3</h1>
  <p class="lead">重做为真正商标方向：先看黑白核心形，再看横版组合。正式注册前仍需近似检索和字体授权/定制。</p>
    <section class="concept">
      <div class="media mark"><img src="kellai-v3-01-mark-black.svg" alt="来字核心 黑白核心"></div>
      <div class="media lockup"><img src="kellai-v3-01-lockup.svg" alt="来字核心 横版"></div>
      <div class="copy">
        <h2>1 来字核心</h2>
        <p>把「来」做成独立核心符号，最像可注册主标。</p>
      </div>
    </section>
    <section class="concept">
      <div class="media mark"><img src="kellai-v3-02-mark-black.svg" alt="来客门 黑白核心"></div>
      <div class="media lockup"><img src="kellai-v3-02-lockup.svg" alt="来客门 横版"></div>
      <div class="copy">
        <h2>2 来客门</h2>
        <p>入口/到来感，但不使用聊天气泡和增长柱。</p>
      </div>
    </section>
    <section class="concept">
      <div class="media mark"><img src="kellai-v3-03-mark-black.svg" alt="三来印 黑白核心"></div>
      <div class="media lockup"><img src="kellai-v3-03-lockup.svg" alt="三来印 横版"></div>
      <div class="copy">
        <h2>3 三来印</h2>
        <p>三个来客汇入一个印记，适合做服务商标。</p>
      </div>
    </section>
    <section class="concept">
      <div class="media mark"><img src="kellai-v3-04-mark-black.svg" alt="中文字标 黑白核心"></div>
      <div class="media lockup"><img src="kellai-v3-04-lockup.svg" alt="中文字标 横版"></div>
      <div class="copy">
        <h2>4 中文字标</h2>
        <p>直接保护品牌名本身，后续可做定制字形。</p>
      </div>
    </section>
</body>
</html>
