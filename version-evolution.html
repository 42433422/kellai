<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客来来 · 版本演进全景</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg-deep: #0a0e1a;
  --bg-card: rgba(15, 22, 42, 0.85);
  --bg-card-hover: rgba(20, 30, 55, 0.95);
  --border-dim: rgba(56, 189, 248, 0.12);
  --border-glow: rgba(56, 189, 248, 0.35);
  --cyan: #38bdf8;
  --cyan-dim: rgba(56, 189, 248, 0.6);
  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.5);
  --gold: #fbbf24;
  --gold-dim: rgba(251, 191, 36, 0.5);
  --green: #34d399;
  --green-dim: rgba(52, 211, 153, 0.5);
  --red: #f87171;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
  --done-accent: var(--green);
  --current-accent: var(--gold);
  --future-accent: var(--purple);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--cyan-dim) var(--bg-deep);
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === BACKGROUND EFFECTS === */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.bg-glow-1 {
  position: fixed;
  top: -20%;
  left: -10%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: drift1 20s ease-in-out infinite;
}

.bg-glow-2 {
  position: fixed;
  bottom: -20%;
  right: -10%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(167,139,250,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: drift2 25s ease-in-out infinite;
}

@keyframes drift1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(5vw, 3vh); }
}

@keyframes drift2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-4vw, -5vh); }
}

/* === NAV === */
.version-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10, 14, 26, 0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-dim);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.nav-brand {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.1rem;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  white-space: nowrap;
}

.nav-track {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-track::-webkit-scrollbar { display: none; }

.nav-node {
  display: flex;
  align-items: center;
  gap: 0;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: all 0.3s;
}

.nav-dot.done { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
.nav-dot.current { background: var(--gold); box-shadow: 0 0 10px var(--gold-dim); animation: pulse-dot 2s ease-in-out infinite; }
.nav-dot.future { background: var(--purple-dim); border: 1.5px dashed var(--purple); }

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 6px var(--gold-dim); }
  50% { box-shadow: 0 0 18px var(--gold); }
}

.nav-line {
  width: 24px;
  height: 2px;
  flex-shrink: 0;
}

.nav-line.done { background: var(--green-dim); }
.nav-line.current { background: linear-gradient(90deg, var(--green-dim), var(--gold-dim)); }
.nav-line.future { background: var(--purple-dim); opacity: 0.4; border-top: 1.5px dashed var(--purple); height: 0; }

.nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-left: 4px;
  transition: color 0.3s;
}

.nav-node:hover .nav-label { color: var(--text-primary); }
.nav-node:hover .nav-dot { transform: scale(1.4); }

.nav-stats {
  display: flex;
  gap: 1.2rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  white-space: nowrap;
}

.nav-stat-val {
  color: var(--cyan);
  font-weight: 700;
}

/* === HERO === */
.hero {
  position: relative;
  z-index: 1;
  padding: 7rem 2rem 3rem;
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}

.hero-overline {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--cyan-dim);
  margin-bottom: 1rem;
  animation: fadeInDown 0.8s ease-out;
}

.hero-title {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 3.5rem);
  line-height: 1.15;
  margin-bottom: 1.2rem;
  animation: fadeInDown 0.8s ease-out 0.15s both;
}

.hero-title .highlight {
  background: linear-gradient(135deg, var(--cyan), var(--purple), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 200%;
  animation: gradientShift 6s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.hero-subtitle {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 700px;
  margin: 0 auto 2rem;
  line-height: 1.8;
  animation: fadeInDown 0.8s ease-out 0.3s both;
}

.hero-subtitle .accent { color: var(--cyan); font-weight: 700; }
.hero-subtitle .gold { color: var(--gold); font-weight: 700; }
.hero-subtitle .purple { color: var(--purple); font-weight: 700; }

.hero-metrics {
  display: flex;
  justify-content: center;
  gap: 2.5rem;
  flex-wrap: wrap;
  animation: fadeInUp 0.8s ease-out 0.5s both;
}

.hero-metric {
  text-align: center;
}

.hero-metric-val {
  font-family: 'Orbitron', monospace;
  font-size: 1.8rem;
  font-weight: 900;
  background: linear-gradient(180deg, var(--text-primary), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-metric-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
  letter-spacing: 1px;
}

/* === SECTION === */
.section {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2.5rem;
}

.section-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.section-icon.product {
  background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(56,189,248,0.05));
  border: 1px solid rgba(56,189,248,0.2);
}

.section-icon.market {
  background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05));
  border: 1px solid rgba(251,191,36,0.2);
}

.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
}

.section-title.product { color: var(--cyan); }
.section-title.market { color: var(--gold); }

.section-tagline {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-left: auto;
  font-style: italic;
}

/* === TIMELINE === */
.timeline {
  position: relative;
  padding-left: 3rem;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--green-dim), var(--gold-dim) 40%, var(--purple-dim) 70%, transparent);
}

/* === VERSION CARD === */
.v-card {
  position: relative;
  margin-bottom: 2rem;
  border-radius: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  padding: 1.5rem 1.8rem;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  opacity: 0;
  transform: translateY(30px);
}

.v-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.v-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(56, 189, 248, 0.08);
}

.v-card.current {
  border-color: rgba(251, 191, 36, 0.3);
  box-shadow: 0 0 30px rgba(251, 191, 36, 0.06), inset 0 0 30px rgba(251, 191, 36, 0.02);
}

.v-card.current:hover {
  border-color: rgba(251, 191, 36, 0.5);
  box-shadow: 0 0 40px rgba(251, 191, 36, 0.1), inset 0 0 30px rgba(251, 191, 36, 0.03);
}

.v-card.future {
  border-style: dashed;
  border-color: rgba(167, 139, 250, 0.2);
  opacity: 0;
}

.v-card.future.visible {
  opacity: 0.75;
}

.v-card.future:hover {
  opacity: 1;
  border-color: rgba(167, 139, 250, 0.4);
}

/* Timeline node dot */
.v-card::before {
  content: '';
  position: absolute;
  left: -2.35rem;
  top: 1.7rem;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  z-index: 2;
}

.v-card.done::before {
  background: var(--green);
  box-shadow: 0 0 8px var(--green-dim);
}

.v-card.current::before {
  background: var(--gold);
  box-shadow: 0 0 12px var(--gold-dim);
  animation: pulse-dot 2s ease-in-out infinite;
}

.v-card.future::before {
  background: transparent;
  border: 2px dashed var(--purple);
}

/* Card header */
.card-head {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}

.v-version {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.3rem;
  letter-spacing: 1px;
}

.v-version.done { color: var(--green); }
.v-version.current { color: var(--gold); }
.v-version.future { color: var(--purple); }

.v-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  line-height: 1.4;
}

.v-badge.done {
  background: rgba(52, 211, 153, 0.1);
  color: var(--green);
  border: 1px solid rgba(52, 211, 153, 0.25);
}

.v-badge.current {
  background: rgba(251, 191, 36, 0.1);
  color: var(--gold);
  border: 1px solid rgba(251, 191, 36, 0.3);
  animation: badge-glow 3s ease-in-out infinite;
}

.v-badge.future {
  background: rgba(167, 139, 250, 0.08);
  color: var(--purple);
  border: 1px dashed rgba(167, 139, 250, 0.25);
}

@keyframes badge-glow {
  0%, 100% { box-shadow: 0 0 4px rgba(251, 191, 36, 0.1); }
  50% { box-shadow: 0 0 12px rgba(251, 191, 36, 0.25); }
}

.v-stage {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-left: auto;
  font-style: italic;
  letter-spacing: 1px;
}

/* Card summary */
.card-summary {
  font-size: 0.95rem;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  line-height: 1.6;
}

.card-summary .keyword {
  font-weight: 700;
}

.card-summary .keyword.done { color: var(--green); }
.card-summary .keyword.current { color: var(--gold); }
.card-summary .keyword.future { color: var(--purple); }

/* Feature list */
.card-features {
  list-style: none;
  margin-bottom: 1.2rem;
}

.card-features li {
  position: relative;
  padding-left: 1.2rem;
  margin-bottom: 0.4rem;
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.card-features li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 6px;
  height: 6px;
  border-radius: 2px;
  transform: rotate(45deg);
}

.v-card.done .card-features li::before { background: var(--green-dim); }
.v-card.current .card-features li::before { background: var(--gold-dim); }
.v-card.future .card-features li::before { background: var(--purple-dim); }

/* Metrics row */
.card-metrics {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  padding-top: 1rem;
  border-top: 1px solid var(--border-dim);
}

.metric {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.metric-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
}

.metric-val.done { color: var(--green); }
.metric-val.current { color: var(--gold); }
.metric-val.future { color: var(--purple-dim); }

.metric-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

/* === EVOLUTION CHART === */
.chart-section {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 2rem 5rem;
}

.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: 16px;
  padding: 2rem;
  overflow: hidden;
}

.chart-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.9rem;
  color: var(--cyan);
  letter-spacing: 2px;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.chart-legend {
  display: flex;
  gap: 1.5rem;
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--text-dim);
}

.legend-line {
  width: 20px;
  height: 3px;
  border-radius: 2px;
}

.legend-line.code { background: var(--cyan); }
.legend-line.test { background: var(--green); }

.chart-svg {
  width: 100%;
  height: 300px;
}

/* === ANIMATIONS === */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .hero { padding: 6rem 1.2rem 2rem; }
  .hero-metrics { gap: 1.5rem; }
  .section { padding: 1.5rem 1rem 3rem; }
  .timeline { padding-left: 2.5rem; }
  .v-card { padding: 1.2rem; }
  .v-stage { margin-left: 0; }
  .card-metrics { gap: 1rem; }
  .nav-stats { display: none; }
  .section-tagline { display: none; }
  .chart-container { padding: 1.2rem; }
}

/* === SCROLL PROGRESS === */
.scroll-progress {
  position: fixed;
  top: 56px;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--purple), var(--gold));
  z-index: 101;
  transition: width 0.1s;
  width: 0%;
}

/* === PHASE TAGLINE BAR === */
.phase-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 2rem auto 3rem;
  max-width: 900px;
  animation: fadeInUp 0.8s ease-out 0.7s both;
}

.phase-step {
  display: flex;
  align-items: center;
  gap: 0;
}

.phase-text {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  letter-spacing: 2px;
  padding: 6px 16px;
  border-radius: 20px;
  white-space: nowrap;
}

.phase-text.tool {
  background: rgba(52, 211, 153, 0.08);
  color: var(--green);
  border: 1px solid rgba(52, 211, 153, 0.2);
}

.phase-text.platform {
  background: rgba(56, 189, 248, 0.08);
  color: var(--cyan);
  border: 1px solid rgba(56, 189, 248, 0.2);
}

.phase-text.assistant {
  background: rgba(251, 191, 36, 0.08);
  color: var(--gold);
  border: 1px solid rgba(251, 191, 36, 0.2);
}

.phase-text.ecosystem {
  background: rgba(167, 139, 250, 0.08);
  color: var(--purple);
  border: 1px solid rgba(167, 139, 250, 0.2);
}

.phase-arrow {
  font-family: 'Orbitron', monospace;
  color: var(--text-dim);
  font-size: 0.7rem;
  margin: 0 6px;
  letter-spacing: 0;
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<!-- Scroll Progress -->
<div class="scroll-progress" id="scrollProgress"></div>

<!-- Navigation -->
<nav class="version-nav">
  <div class="nav-brand">KELAILAI</div>

  <div class="nav-stats">
    <span>版本 <span class="nav-stat-val" id="statVersions">8</span></span>

</nav>

<!-- Hero -->

      <div class="hero-metric-val">5</div>
      <div class="hero-metric-label">市场阶段</div>

      <div class="hero-metric-val">v3.0</div>

    <div class="hero-metric">
      <div class="hero-metric-val">13</div>

  <div class="phase-bar">
    <div class="phase-step">
      <span class="phase-text tool">🔧 工具</span>

    <div class="phase-step">
      <span class="phase-text platform">⚡ 平台</span>
      <span class="phase-arrow">→</span>
    </div>

      <span class="phase-text assistant">🤖 助手</span>
      <span class="phase-arrow">→</span>
    </div>
    <div class="phase-step">
      <span class="phase-text ecosystem">🌐 生态</span>
    </div>
  </div>
</section>

<!-- Product Versions -->
<section class="section" id="productSection">
  <div class="section-header">
    <div class="section-icon product">🚀</div>
    <div class="section-title product">PRODUCT ROADMAP</div>
    <div class="section-tagline">工具 → 平台 → 助手 → 生态</div>
  </div>
  <div class="timeline" id="productTimeline"></div>
</section>

<!-- Market Versions -->
<section class="section" id="marketSection">
  <div class="section-header">
    <div class="section-icon market">📈</div>
    <div class="section-title market">MARKET ROADMAP</div>
    <div class="section-tagline">验证 → 量化 → 扩张 → 商业 → 资本</div>
  </div>
  <div class="timeline" id="marketTimeline"></div>
</section>

<!-- Evolution Chart -->
<section class="chart-section">
  <div class="chart-container">
    <div class="chart-title">
      <span>EVOLUTION CURVE</span>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-line code"></div>代码规模</div>
        <div class="legend-item"><div class="legend-line test"></div>测试通过率</div>
      </div>

// === RENDER FUNCTIONS ===
function renderCard(v, index) {
  const statusClass = v.status;
  const delay = index * 0.1;

  let metricsHtml = v.metrics.map(m =>
    `<div class="metric">
      <div class="metric-val ${statusClass}">${m.val}</div>
      <div class="metric-label">${m.label}</div>
    </div>`
  ).join('');

  let featuresHtml = v.features.map(f => `<li>${f}</li>`).join('');

  return `<div class="v-card ${statusClass}" data-delay="${delay}" id="${v.version.replace('.', '_')}">
    <div class="card-head">
      <span class="v-version ${statusClass}">${v.version}</span>
      <span class="v-badge ${statusClass}">${v.badge}</span>
      <span class="v-stage">${v.stage}</span>
    </div>
    <div class="card-summary">
      ${v.summary} · <span class="keyword ${statusClass}">${v.keyword}</span>
    </div>
    <ul class="card-features">${featuresHtml}</ul>
    <div class="card-metrics">${metricsHtml}</div>
  </div>`;
}

function renderTimeline(containerId, versions) {
  const container = document.getElementById(containerId);
  container.innerHTML = versions.map((v, i) => renderCard(v, i)).join('');
}

function renderNav() {
  const track = document.getElementById('navTrack');
  const allVersions = [
    ...productVersions.map(v => ({ ...v, short: v.version.replace('v', '').replace('.0.0', '') })),
    { version: '|', status: 'divider' },
    ...marketVersions.map(v => ({ ...v, short: v.version.replace('M', 'M') }))
  ];

  let html = '';
  allVersions.forEach((v, i) => {
    if (v.status === 'divider') {
      html += `<span style="color:var(--text-dim);margin:0 6px;font-size:0.7rem">|</span>`;
      return;
    }
    const lineStatus = v.status === 'done' ? 'done' : v.status === 'current' ? 'current' : 'future';
    if (i > 0 && allVersions[i-1].status !== 'divider') {
      html += `<div class="nav-line ${lineStatus}"></div>`;
    }
    html += `<div class="nav-node" onclick="document.getElementById('${v.version.replace(/\./g, '_')}')?.scrollIntoView({behavior:'smooth',block:'center'})">
      <div class="nav-dot ${v.status}"></div>
      <span class="nav-label">${v.short}</span>
    </div>`;
  });
  track.innerHTML = html;
}

// === CHART ===
function renderChart() {
  const svg = document.getElementById('chartSvg');
  const w = 1000, h = 300;
  const padL = 60, padR = 60, padT = 30, padB = 50;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  // Data points (code scale and test pass rate)
  const codeData = [42, 128, 256, 380, 460, 580, 700, 900];
  const testData = [78, 85, 91, 93, 95, 96, 97, 98];
  const labels = ['v1.0', 'v2.0', 'v3.0', 'v4.0', 'v5.0', 'v6.0', 'v7.0', 'v8.0'];

  const maxCode = 1000;
  const minTest = 70, maxTest = 100;

  function xPos(i) { return padL + (i / (codeData.length - 1)) * chartW; }
  function yCode(val) { return padT + chartH - (val / maxCode) * chartH; }
  function yTest(val) { return padT + chartH - ((val - minTest) / (maxTest - minTest)) * chartH; }

  // Grid lines
  let gridLines = '';
  for (let i = 0; i <= 5; i++) {
    const y = padT + (i / 5) * chartH;
    gridLines += `<line x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}" stroke="rgba(56,189,248,0.06)" stroke-width="1"/>`;
  }

  // Code area fill
  let codeArea = `M${xPos(0)},${yCode(0)}`;
  codeData.forEach((v, i) => { codeArea += ` L${xPos(i)},${yCode(v)}`; });
  codeArea += ` L${xPos(codeData.length - 1)},${yCode(0)} Z`;

  // Code line
  let codeLine = '';
  codeData.forEach((v, i) => {
    codeLine += (i === 0 ? 'M' : 'L') + `${xPos(i)},${yCode(v)}`;
  });

  // Test line
  let testLine = '';
  testData.forEach((v, i) => {
    testLine += (i === 0 ? 'M' : 'L') + `${xPos(i)},${yTest(v)}`;
  });

  // Dots
  let codeDots = codeData.map((v, i) => {
    const isCurrent = i === 2;
    const color = i < 2 ? '#34d399' : i === 2 ? '#fbbf24' : '#a78bfa';
    const r = isCurrent ? 6 : 4;
    return `<circle cx="${xPos(i)}" cy="${yCode(v)}" r="${r}" fill="${color}" stroke="rgba(10,14,26,0.8)" stroke-width="2">
      <animate attributeName="r" values="${r};${r+2};${r}" dur="3s" repeatCount="indefinite" begin="${i*0.3}s"/>
    </circle>`;
  }).join('');

  let testDots = testData.map((v, i) => {
    const color = i < 2 ? '#34d399' : i === 2 ? '#fbbf24' : '#a78bfa';
    return `<circle cx="${xPos(i)}" cy="${yTest(v)}" r="3.5" fill="${color}" stroke="rgba(10,14,26,0.8)" stroke-width="2"/>`;
  }).join('');

  // Labels
  let xLabels = labels.map((l, i) =>
    `<text x="${xPos(i)}" y="${h - padB + 20}" text-anchor="middle" fill="#64748b" font-size="11" font-family="JetBrains Mono, monospace">${l}</text>`
  ).join('');

  // Y axis labels
  let yLabelsCode = '';
  for (let i = 0; i <= 5; i++) {
    const val = Math.round((maxCode / 5) * (5 - i));
    const y = padT + (i / 5) * chartH;
    yLabelsCode += `<text x="${padL - 10}" y="${y + 4}" text-anchor="end" fill="#38bdf8" font-size="10" font-family="JetBrains Mono, monospace">${val}</text>`;
  }

  let yLabelsTest = '';
  for (let i = 0; i <= 5; i++) {
    const val = Math.round(minTest + ((maxTest - minTest) / 5) * (5 - i));
    const y = padT + (i / 5) * chartH;
    yLabelsTest += `<text x="${w - padR + 10}" y="${y + 4}" text-anchor="start" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">${val}%</text>`;
  }

  // Current version vertical line
  const currentX = xPos(2);
  const currentLine = `<line x1="${currentX}" y1="${padT}" x2="${currentX}" y2="${padT + chartH}" stroke="rgba(251,191,36,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="${currentX}" y="${padT - 8}" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="JetBrains Mono, monospace">CURRENT</text>`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="codeGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(56,189,248,0.2)"/>
        <stop offset="100%" stop-color="rgba(56,189,248,0)"/>
      </linearGradient>
      <linearGradient id="codeStroke" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#34d399"/>
        <stop offset="35%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient>
      <linearGradient id="testStroke" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#34d399"/>
        <stop offset="35%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${codeArea}" fill="url(#codeGrad)"/>
    <path d="${codeLine}" fill="none" stroke="url(#codeStroke)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${testLine}" fill="none" stroke="url(#testStroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
    ${codeDots}
    ${testDots}
    ${currentLine}
    ${xLabels}
    ${yLabelsCode}
    ${yLabelsTest}
  `;
}

// === SCROLL ANIMATIONS ===
function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = parseFloat(entry.target.dataset.delay) || 0;
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, delay * 1000);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.v-card').forEach(card => observer.observe(card));
}

function initScrollProgress() {
  const bar = document.getElementById('scrollProgress');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  });
}

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
  renderTimeline('productTimeline', productVersions);
  renderTimeline('marketTimeline', marketVersions);
  renderNav();
  renderChart();
  initScrollAnimations();
  initScrollProgress();
});
</script>
